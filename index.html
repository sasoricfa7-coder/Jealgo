<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a1a">
<title>JeAlgo</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="profil.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --zoom: 1; }
html, body { height: 100%; overflow: hidden; background: #1a1a1c; }
body { display: flex; flex-direction: column; height: 100vh; }

/* ── TOOLBAR ── */
#toolbar {
  display: flex;
  align-items: center;
  background: #222224;
  padding: 5px 8px;
  gap: 5px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.btn {
  padding: 7px 13px;
  border: none;
  border-radius: 6px;
  background: #46464a;
  color: #f0f0f0;
  font-size: calc(12px * var(--zoom));
  font-weight: bold;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: filter 0.1s, transform 0.1s;
}
.btn:active { filter: brightness(1.5); transform: scale(0.95); }
.btn-import { background: #1a5a8a; }
.btn-export { background: #6a3a8a; }
.btn-tab    { background: #3a3a6a; }
.btn-actif  { background: #2d7a45 !important; }

/* ── SUGGESTIONS ── */
#sugg-scroll {
  background: #202022;
  overflow-x: auto;
  overflow-y: hidden;
  flex-shrink: 0;
  height: 0;
  transition: height 0.15s;
}
#sugg-scroll.visible { height: 46px; }
#sugg-inner {
  display: inline-flex;
  gap: 5px;
  padding: 5px 8px;
  height: 100%;
  align-items: center;
}
.sugg-btn {
  padding: 5px 11px;
  border: none;
  border-radius: 5px;
  color: white;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  font-weight: bold;
  touch-action: manipulation;
}
.sugg-btn:active { filter: brightness(1.5); }
.sugg-tab-hint {
  padding: 4px 8px;
  background: #444;
  color: #ccc;
  border-radius: 4px;
  font-size: 11px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── ZONE PRINCIPALE ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── PANNEAU FICHIERS (GAUCHE) ── */
#panneau-fich {
  width: 0;
  overflow: hidden;
  background: #1a1a1e;
  transition: width 0.2s ease;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #333;
}
#panneau-fich.ouvert { width: 200px; }

#fich-header {
  padding: 10px 8px;
  color: #aaa;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-bottom: 1px solid #333;
  flex-shrink: 0;
  white-space: nowrap;
}

/* Liste fichiers — scroll entre header et bouton nouveau */
#fich-liste {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 6px 0;
  /* Important : permet le scroll sur iOS */
  -webkit-overflow-scrolling: touch;
}

.fich-item {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  cursor: pointer;
  border-radius: 6px;
  margin: 2px 4px;
  gap: 6px;
  transition: background 0.1s;
}
.fich-item:hover { background: #2a2a2e; }
.fich-item.actif {
  background: #1e3a2a;
  border-left: 3px solid #2d7a45;
}
.fich-nom {
  flex: 1;
  color: #ccc;
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.fich-item.actif .fich-nom { color: #5dba7d; font-weight: bold; }
.fich-sup {
  background: none;
  border: none;
  color: #666;
  cursor: pointer;
  font-size: 13px;
  padding: 2px 4px;
  border-radius: 3px;
  flex-shrink: 0;
  line-height: 1;
  touch-action: manipulation;
}
.fich-sup:hover { color: #e05555; background: #2a1a1a; }

/* Bouton nouveau — toujours visible en bas, jamais caché */
#fich-nouveau {
  margin: 6px 8px;
  padding: 10px 8px;
  background: #252528;
  border: 1px dashed #444;
  border-radius: 6px;
  color: #888;
  font-size: 12px;
  cursor: pointer;
  text-align: center;
  flex-shrink: 0;      /* Ne rétrécit jamais */
  white-space: nowrap;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
#fich-nouveau:hover { background: #2a2a2e; color: #aaa; }
#fich-nouveau:active { filter: brightness(1.3); }

/* ── ZONE EDITION ── */
#zone-edition { display: flex; flex: 1; overflow: hidden; }

#numeros {
  background: #e8e8e8;
  color: #999;
  font-family: 'Courier New', monospace;
  font-size: calc(14px * var(--zoom));
  line-height: 1.6;
  padding: 8px 6px;
  text-align: right;
  overflow: hidden;
  user-select: none;
  min-width: 42px;
  white-space: pre;
  flex-shrink: 0;
}

#editeur-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #fff;
}
#coloreur {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  font-family: 'Courier New', monospace;
  font-size: calc(14px * var(--zoom));
  line-height: 1.6;
  padding: 8px 10px;
  white-space: pre;
  overflow: auto;
  pointer-events: none;
  background: transparent;
  border: none;
  tab-size: 4;
  box-sizing: border-box;
  word-wrap: normal;
}
#editeur {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  font-family: 'Courier New', monospace;
  font-size: calc(14px * var(--zoom));
  line-height: 1.6;
  padding: 8px 10px;
  border: none;
  outline: none;
  resize: none;
  overflow: auto;
  tab-size: 4;
  white-space: pre;
  background: transparent;
  color: rgba(0,0,0,0);
  caret-color: #111;
  z-index: 2;
  box-sizing: border-box;
  word-wrap: normal;
}

/* ── COULEURS ── */
.c-comment { color: #b35a00; font-style: italic; }
.c-string  { color: #1a7a1a; font-weight: bold; }
.c-kw1     { color: #cc4400; font-weight: bold; }
.c-kw2     { color: #8800aa; font-weight: bold; font-style: italic; }
.c-builtin { color: #0044cc; }
.c-func    { color: #007755; font-weight: bold; font-style: italic; }
.c-type    { color: #0055cc; font-weight: bold; font-style: italic; }
.c-bool    { color: #cc0066; font-weight: bold; }
.c-op      { color: #444488; font-weight: bold; }
.c-number  { color: #0077cc; }
.c-default { color: #222222; }

/* ── PANNEAU SYMBOLES (DROITE) ── */
#panneau-sym {
  width: 0;
  overflow: hidden;
  background: #161618;
  transition: width 0.2s ease;
  flex-shrink: 0;
  border-left: 1px solid #333;
}
#panneau-sym.ouvert { width: 72px; }

/* Défilable sur mobile — important */
#sym-inner {
  width: 72px;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch; /* scroll fluide iOS */
  padding: 5px 3px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.sym-btn {
  width: 100%;
  padding: 10px 2px;  /* plus grand pour mobile */
  border: none;
  border-radius: 5px;
  background: #2d4a7a;
  color: #fff;
  font-size: calc(12px * var(--zoom));
  font-weight: bold;
  cursor: pointer;
  text-align: center;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0; /* ne rétrécit pas */
}
.sym-btn:active { filter: brightness(1.5); }

/* ── STATUT ── */
#statut {
  background: #d8d8d8;
  color: #444;
  font-size: 11px;
  padding: 3px 10px;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
}

#import-input { display: none; }

/* ── POPUPS ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.overlay.visible { display: flex; }
.popup {
  background: #252528;
  border-radius: 12px;
  padding: 20px;
  width: 88%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.popup h3 { color: #eee; font-size: 16px; }
.popup label { color: #aaa; font-size: 13px; }
.popup input[type=text] {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #444;
  background: #1a1a1c;
  color: #eee;
  font-size: 15px;
}
.popup-info { color: #aaa; font-size: 12px; line-height: 1.6; }
.popup-btn {
  padding: 12px;
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  touch-action: manipulation;
}
.popup-btn-ok      { background: #2d7a45; }
.popup-btn-annuler { background: #555; }
</style>
</head>
<body>

<input type="file" id="import-input" accept=".je,.txt,.md">

<!-- TOOLBAR -->
<div id="toolbar">
  <!-- Bouton panneau fichiers gauche -->
  <button class="btn" id="btn-fich" onclick="toggleFichiers()">≡ Fich</button>
  <!-- Import depuis appareil -->
  <button class="btn btn-import" onclick="importerFichier()">Importer</button>
  <!-- Export vers appareil -->
  <button class="btn btn-export" onclick="exporterFichier()">Exporter</button>
  <!-- Undo/Redo avec flèches -->
  <button class="btn" onclick="undo()" title="Annuler">&#8592;</button>
  <button class="btn" onclick="redo()" title="Rétablir">&#8594;</button>
  <!-- TAB permanent -->
  <button class="btn btn-tab" onclick="inserer('\t',false)">TAB</button>
  <!-- Zoom -->
  <button class="btn" onclick="zoom(1)">A+</button>
  <button class="btn" onclick="zoom(-1)">A-</button>
  <!-- Bouton panneau symboles droite -->
  <button class="btn" id="btn-sym" onclick="toggleSymboles()">Sym ≡</button>
</div>

<!-- SUGGESTIONS EN HAUT -->
<div id="sugg-scroll">
  <div id="sugg-inner"></div>
</div>

<!-- ZONE PRINCIPALE -->
<div id="main">

  <!-- PANNEAU FICHIERS GAUCHE -->
  <div id="panneau-fich">
    <div id="fich-header">📁 Fichiers</div>
    <!-- Liste scrollable -->
    <div id="fich-liste"></div>
    <!-- Nouveau fichier toujours visible en bas -->
    <div id="fich-nouveau" onclick="nouveauFichier()">+ Nouveau fichier</div>
  </div>

  <!-- EDITEUR -->
  <div id="zone-edition">
    <div id="numeros">1</div>
    <div id="editeur-wrap">
      <div id="coloreur"></div>
      <textarea id="editeur" spellcheck="false"
                autocorrect="off" autocapitalize="off"
                autocomplete="off"></textarea>
    </div>
  </div>

  <!-- PANNEAU SYMBOLES DROITE — défilable -->
  <div id="panneau-sym">
    <div id="sym-inner"></div>
  </div>

</div>

<!-- STATUT -->
<div id="statut">sans_titre.je  |  Ln: 1, Col: 1</div>

<!-- POPUP RENOMMER -->
<div class="overlay" id="overlay-renommer">
  <div class="popup">
    <h3>Renommer le fichier</h3>
    <label>Nouveau nom</label>
    <input type="text" id="renommer-input" placeholder="mon_algorithme">
    <button class="popup-btn popup-btn-ok" id="renommer-ok">Renommer</button>
    <button class="popup-btn popup-btn-annuler"
            onclick="fermerPopup('overlay-renommer')">Annuler</button>
  </div>
</div>

<!-- POPUP NOUVEAU FICHIER -->
<div class="overlay" id="overlay-nouveau">
  <div class="popup">
    <h3 id="nouveau-titre">Nouveau fichier</h3>
    <label>Nom du fichier</label>
    <input type="text" id="nouveau-input" placeholder="mon_algorithme">
    <button class="popup-btn popup-btn-ok" id="nouveau-ok">Créer</button>
    <button class="popup-btn popup-btn-annuler"
            onclick="fermerPopup('overlay-nouveau')">Annuler</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
// SERVICE WORKER + AUTO UPDATE SILENCIEUX
// ════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.update();
    setInterval(() => { if (navigator.onLine) reg.update(); }, 30000);
    reg.addEventListener('updatefound', () => {
      const nv = reg.installing;
      nv.addEventListener('statechange', () => {
        if (nv.state === 'installed' && navigator.serviceWorker.controller) {
          nv.postMessage('SKIP_WAITING');
        }
      });
    });
  });
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    sauvegarderBrouillon();
    window.location.reload();
  });
}

// ════════════════════════════════════════════════
// ÉTAT GLOBAL
// ════════════════════════════════════════════════
let titreFichier      = 'sans_titre.je';
let cheminFichier     = null;
let zoomLevel         = 1;
let historique        = [];
let futur             = [];
let ignoreChange      = false;
let suggEvent         = null;
let panneauFichOuvert = false;
let panneauSymOuvert  = false;
let suggActifs        = [];
let renommerAncien    = null;

// Références DOM
const editeur     = document.getElementById('editeur');
const coloreur    = document.getElementById('coloreur');
const numeros     = document.getElementById('numeros');
const statut      = document.getElementById('statut');
const suggScroll  = document.getElementById('sugg-scroll');
const suggInner   = document.getElementById('sugg-inner');
const panneauFich = document.getElementById('panneau-fich');
const fichListe   = document.getElementById('fich-liste');
const panneau     = document.getElementById('panneau-sym');
const symInner    = document.getElementById('sym-inner');
const importInput = document.getElementById('import-input');
const btnFich     = document.getElementById('btn-fich');
const btnSym      = document.getElementById('btn-sym');

// ════════════════════════════════════════════════
// BROUILLON AUTOMATIQUE
// Sauvegarde à chaque frappe, restaure au rechargement
// Le travail n'est JAMAIS perdu
// ════════════════════════════════════════════════
const CLE_BROUILLON = 'jealgo_brouillon_texte';
const CLE_TITRE     = 'jealgo_brouillon_titre';
const CLE_CHEMIN    = 'jealgo_brouillon_chemin';

function sauvegarderBrouillon() {
  localStorage.setItem(CLE_BROUILLON, editeur.value);
  localStorage.setItem(CLE_TITRE,     titreFichier);
  localStorage.setItem(CLE_CHEMIN,    cheminFichier || '');
}

function restaurerBrouillon() {
  const texte  = localStorage.getItem(CLE_BROUILLON);
  const titre  = localStorage.getItem(CLE_TITRE);
  const chemin = localStorage.getItem(CLE_CHEMIN);
  if (texte !== null) {
    editeur.value = texte;
    titreFichier  = titre  || 'sans_titre.je';
    cheminFichier = chemin || null;
  }
}

// Sauvegarde périodique toutes les 3 secondes
setInterval(sauvegarderBrouillon, 3000);
// Sauvegarde avant fermeture
window.addEventListener('beforeunload', sauvegarderBrouillon);

// ════════════════════════════════════════════════
// COLORATION SYNTAXIQUE
// Règles appliquées dans l'ordre — les premières
// ont priorité sur les suivantes
// ════════════════════════════════════════════════
const REGLES = [
  // Commentaires — priorité max
  { re: /(#[^\n]*)/g,
    cls: 'c-comment' },
  // Chaînes entre guillemets
  { re: /("(?:[^"\\]|\\.)*")/g,
    cls: 'c-string' },
  // Mots-clés structure : Algorithme Debut Fin
  { re: /\b(Algorithme|Debut|Début|Fin)\b/gi,
    cls: 'c-kw1' },
  // Types : Variables Constantes
  { re: /\b(Variables?|Constantes?)\b/gi,
    cls: 'c-type' },
  // Mots-clés contrôle : Si Pour Tant que etc
  { re: /\b(Fin\s+Si|Fin\s+Pour|Fin\s+Tant\s+que|Fin\s+Cas|Si|Sinon|Alors|Cas|Vaut|Pour|Faire|Tant\s+que|Repeter|Répeter|Jusqu|Tableau)\b/gi,
    cls: 'c-kw2' },
  // Fonctions built-in : Ecrire Lire entier reel etc
  { re: /\b(Ecrire|Écrire|Lire|entiers?|réels?|reels?|booléens?|booleans?|caractères?|caracteres?|chaine\s+de\s+caractères?)\b/gi,
    cls: 'c-builtin' },
  // Retourne
  { re: /\b(Retourne)\b/gi,
    cls: 'c-func' },
  // Fonction Procedure
  { re: /\b(Fonction|Procedure)\b/gi,
    cls: 'c-type' },
  // Booléens
  { re: /\b(vrai|faux)\b/gi,
    cls: 'c-bool' },
  // Opérateurs texte
  { re: /\b(mod|div|et|ou|non)\b/gi,
    cls: 'c-op' },
  // Opérateurs symboles
  { re: /(<--|<-|<=|>=|<>|==|!=|[+\-*\/^<>=])/g,
    cls: 'c-op' },
  // Nombres
  { re: /\b(\d+(?:\.\d+)?)\b/g,
    cls: 'c-number' },
];

function escHtml(t) {
  return t
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function colorier(txt) {
  return txt.split('\n').map(ligne => {
    let segs = [{ t: ligne, ok: false }];
    for (const { re, cls } of REGLES) {
      const next = [];
      for (const s of segs) {
        if (s.ok) { next.push(s); continue; }
        let last = 0;
        re.lastIndex = 0;
        let m;
        while ((m = re.exec(s.t)) !== null) {
          if (m.index > last)
            next.push({ t: s.t.slice(last, m.index), ok: false });
          next.push({ t: m[0], ok: true, cls });
          last = re.lastIndex;
        }
        if (last < s.t.length)
          next.push({ t: s.t.slice(last), ok: false });
      }
      segs = next;
    }
    return segs.map(s =>
      s.ok
        ? `<span class="${s.cls}">${escHtml(s.t)}</span>`
        : `<span class="c-default">${escHtml(s.t)}</span>`
    ).join('');
  }).join('\n');
}

function majColoreur() {
  coloreur.innerHTML = colorier(editeur.value) + '\n';
  coloreur.scrollTop  = editeur.scrollTop;
  coloreur.scrollLeft = editeur.scrollLeft;
}

// Synchroniser scroll coloreur et numéros avec éditeur
editeur.addEventListener('scroll', () => {
  coloreur.scrollTop  = editeur.scrollTop;
  coloreur.scrollLeft = editeur.scrollLeft;
  numeros.scrollTop   = editeur.scrollTop;
});

// ════════════════════════════════════════════════
// MOTS CLÉS ET AUTO-COMPLÉTION
// ════════════════════════════════════════════════
const MOTS_CLES = [
  'Algorithme','Debut','Début','Fin','Variable','Variables',
  'Constante','Constantes','Si','Sinon','Alors','Fin Si',
  'Fin cas','Cas','Vaut','Pour','Faire','Fin Pour',
  'Tant que','Fin Tant que','Repeter','Répeter','Répéter',
  'Jusqu','Tableau','Ecrire','Lire','Retourne','Fonction',
  'Procedure','entier','reel','booleen','caractere',
  'chaine de caracteres','vrai','faux','mod','div','et','ou','non'
];

// Templates — préfixe exact déclenche le template
const AUTO_COMPLETE = {
  'ecrire':  { texte: 'Ecrire("")',                          offset: 2  },
  'lire':    { texte: 'Lire()',                               offset: 1  },
  'algo':    { texte: 'Algorithme \nDebut\n\nFin',            offset: 15 },
  'si':      { texte: 'Si  Alors\n\nFin Si',                  offset: 12 },
  'pour':    { texte: "Pour  <- 1 jusqu'\nFaire\n\nFin Pour", offset: 32 },
  'tantque': { texte: 'Tant que \nFaire\n\nFin Tant que',     offset: 22 },
  'fonc':    { texte: 'Fonction ():\n\nFin Fonction',         offset: 10 },
  'proc':    { texte: 'Procedure ():\n\nFin Procedure',       offset: 12 },
};

// Paires auto-fermantes au clavier
const PAIRES = { '(': ')', '"': '"', '[': ']' };

// ════════════════════════════════════════════════
// SYMBOLES DU PANNEAU DROIT
// Défilables sur mobile grâce à overflow-y:auto
// ════════════════════════════════════════════════
const SYMBOLES = [
  { label: '<-',  val: '<-',    paire: false },
  { label: '<--', val: '<--',   paire: false },
  { label: '()',  val: '(',     paire: true  },
  { label: '""',  val: '"',     paire: true  },
  { label: '[]',  val: '[',     paire: true  },
  { label: '<',   val: '<',     paire: false },
  { label: '>',   val: '>',     paire: false },
  { label: '<=',  val: '<=',    paire: false },
  { label: '>=',  val: '>=',    paire: false },
  { label: '==',  val: '==',    paire: false },
  { label: '!=',  val: '!=',    paire: false },
  { label: 'mod', val: ' mod ', paire: false },
  { label: 'div', val: ' div ', paire: false },
  { label: 'et',  val: ' et ',  paire: false },
  { label: 'ou',  val: ' ou ',  paire: false },
  { label: 'non', val: 'non ',  paire: false },
  { label: ':',   val: ':',     paire: false },
  { label: ',',   val: ',',     paire: false },
  { label: ';',   val: ';',     paire: false },
  { label: '+',   val: '+',     paire: false },
  { label: '-',   val: '-',     paire: false },
  { label: '*',   val: '*',     paire: false },
  { label: '/',   val: '/',     paire: false },
];

// Construire les boutons symboles
SYMBOLES.forEach(s => {
  const b = document.createElement('button');
  b.className = 'sym-btn';
  b.textContent = s.label;
  b.addEventListener('click', () => inserer(s.val, s.paire));
  symInner.appendChild(b);
});

// ════════════════════════════════════════════════
// PANNEAUX GAUCHE ET DROITE
// ════════════════════════════════════════════════
function toggleFichiers() {
  panneauFichOuvert = !panneauFichOuvert;
  panneauFich.classList.toggle('ouvert', panneauFichOuvert);
  btnFich.classList.toggle('btn-actif', panneauFichOuvert);
}

function toggleSymboles() {
  panneauSymOuvert = !panneauSymOuvert;
  panneau.classList.toggle('ouvert', panneauSymOuvert);
  btnSym.classList.toggle('btn-actif', panneauSymOuvert);
}

// ════════════════════════════════════════════════
// ZOOM GLOBAL — affecte toute l'interface
// ════════════════════════════════════════════════
function zoom(dir) {
  zoomLevel = Math.min(Math.max(zoomLevel + dir * 0.15, 0.5), 3);
  document.documentElement.style.setProperty('--zoom', zoomLevel);
  majColoreur();
}

// Pinch-to-zoom sur mobile
let touches = [], distInit = null;
document.addEventListener('touchstart', e => {
  touches = Array.from(e.touches);
  if (touches.length === 2) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    distInit = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: true });
document.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && distInit) {
    const t = Array.from(e.touches);
    const dx = t[0].clientX - t[1].clientX;
    const dy = t[0].clientY - t[1].clientY;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d / distInit > 1.08)      { zoom(1);  distInit = d; }
    else if (d / distInit < 0.92) { zoom(-1); distInit = d; }
  }
}, { passive: true });
document.addEventListener('touchend', () => { distInit = null; }, { passive: true });

// ════════════════════════════════════════════════
// INSERTION DE TEXTE À LA POSITION DU CURSEUR
// ════════════════════════════════════════════════
function inserer(texte, estPaire) {
  const s   = editeur.selectionStart;
  const e2  = editeur.selectionEnd;
  const txt = editeur.value;
  let nouveau, curseur;
  if (estPaire && PAIRES[texte]) {
    // Insérer paire et placer curseur entre les deux
    nouveau = txt.slice(0, s) + texte + PAIRES[texte] + txt.slice(e2);
    curseur = s + 1;
  } else {
    nouveau = txt.slice(0, s) + texte + txt.slice(e2);
    curseur = s + texte.length;
  }
  sauverHist();
  editeur.value = nouveau;
  editeur.setSelectionRange(curseur, curseur);
  editeur.focus();
  majTout();
}

// ════════════════════════════════════════════════
// GESTION CLAVIER
// ════════════════════════════════════════════════
editeur.addEventListener('keydown', e => {
  // Raccourcis clavier
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); sauverFichierActuel(); return; }

  // Tab — accepte la première suggestion ou insère tabulation
  if (e.key === 'Tab') {
    e.preventDefault();
    if (suggActifs.length > 0) {
      const p = suggActifs[0];
      if (p.template) completerTemplate(p.texte, p.offset);
      else completer(p.mot);
    } else {
      inserer('\t', false);
    }
    return;
  }

  // Échap — ferme les suggestions
  if (e.key === 'Escape') {
    suggInner.innerHTML = '';
    suggScroll.classList.remove('visible');
    suggActifs = [];
    return;
  }

  // Auto-fermeture des paires au clavier
  if (PAIRES[e.key]) {
    e.preventDefault();
    inserer(e.key, true);
    return;
  }
});

// ════════════════════════════════════════════════
// ÉVÉNEMENTS ÉDITEUR
// ════════════════════════════════════════════════
editeur.addEventListener('input', () => {
  if (ignoreChange) return;
  sauverHist();
  majTout();
  // Délai court pour ne pas bloquer la frappe
  clearTimeout(suggEvent);
  suggEvent = setTimeout(majSuggestions, 200);
});

editeur.addEventListener('keyup', majStatut);
editeur.addEventListener('click', () => {
  majStatut();
  // Fermer suggestions au clic dans l'éditeur
  suggInner.innerHTML = '';
  suggScroll.classList.remove('visible');
  suggActifs = [];
});

function sauverHist() {
  const txt = editeur.value;
  if (!historique.length || historique[historique.length - 1] !== txt) {
    historique.push(txt);
    if (historique.length > 100) historique.shift();
    futur = [];
  }
}

function majTout() {
  majNumeros();
  majStatut();
  majColoreur();
  sauvegarderBrouillon();
  // Sauvegarde automatique si fichier ouvert
  if (cheminFichier) sauverFichierSilencieux(cheminFichier);
}

function majNumeros() {
  const n = (editeur.value.match(/\n/g) || []).length + 1;
  numeros.textContent = Array.from({ length: n }, (_, i) => i + 1).join('\n');
  numeros.scrollTop = editeur.scrollTop;
}

function majStatut() {
  const pos   = editeur.selectionStart;
  const avant = editeur.value.slice(0, pos);
  const ln    = (avant.match(/\n/g) || []).length + 1;
  const col   = avant.length - (avant.lastIndexOf('\n') + 1) + 1;
  statut.textContent = `${titreFichier}  |  Ln: ${ln}, Col: ${col}`;
}

// ════════════════════════════════════════════════
// UNDO / REDO
// ════════════════════════════════════════════════
function undo() {
  if (!historique.length) return;
  futur.push(editeur.value);
  ignoreChange = true;
  editeur.value = historique.pop();
  ignoreChange = false;
  majTout();
}

function redo() {
  if (!futur.length) return;
  historique.push(editeur.value);
  ignoreChange = true;
  editeur.value = futur.pop();
  ignoreChange = false;
  majTout();
}

// ════════════════════════════════════════════════
// SUGGESTIONS INTELLIGENTES
// Mots-clés en bleu, variables du fichier en vert
// Templates en orange avec TAB pour accepter
// ════════════════════════════════════════════════
function majSuggestions() {
  const pos     = editeur.selectionStart;
  const avant   = editeur.value.slice(0, pos);
  const m       = avant.match(/[A-Za-zÀ-ÿ_][A-Za-zÀ-ÿ0-9_]*$/);
  const prefixe = m ? m[0] : '';

  suggInner.innerHTML = '';
  suggScroll.classList.remove('visible');
  suggActifs = [];
  if (prefixe.length < 2) return;

  const pl = prefixe.toLowerCase();

  // Indicateur TAB pour accepter
  const hint = document.createElement('span');
  hint.className = 'sugg-tab-hint';
  hint.textContent = 'TAB=OK';

  // Template si préfixe exact
  if (AUTO_COMPLETE[pl]) {
    const { texte, offset } = AUTO_COMPLETE[pl];
    const b = document.createElement('button');
    b.className = 'sugg-btn';
    b.style.background = '#8a2a10';
    b.textContent = '▶ ' + texte.replace(/\n/g, ' ').slice(0, 22);
    b.addEventListener('click', () => completerTemplate(texte, offset));
    suggActifs.push({ template: true, texte, offset });
    suggInner.appendChild(hint);
    suggInner.appendChild(b);
  }

  // Mots-clés correspondants
  const cles = MOTS_CLES.filter(mk =>
    mk.toLowerCase().startsWith(pl) && mk.toLowerCase() !== pl
  );

  // Mots du fichier courant
  const vus = new Set(cles.map(mk => mk.toLowerCase()));
  const fichiermots = [];
  const re2 = /[A-Za-zÀ-ÿ_][A-Za-zÀ-ÿ0-9_]*/g;
  let mm;
  while ((mm = re2.exec(editeur.value)) !== null) {
    const mot = mm[0];
    if (mot.toLowerCase().startsWith(pl) &&
        mot.toLowerCase() !== pl &&
        !vus.has(mot.toLowerCase())) {
      vus.add(mot.toLowerCase());
      fichiermots.push(mot);
    }
  }

  const tous = [...cles.slice(0, 5), ...fichiermots.slice(0, 3)];
  if (!tous.length && !suggActifs.length) return;

  if (!suggActifs.length) {
    suggInner.appendChild(hint);
    if (tous.length) suggActifs.push({ template: false, mot: tous[0] });
  }

  tous.slice(0, 7).forEach((mot, idx) => {
    const b = document.createElement('button');
    b.className = 'sugg-btn';
    b.style.background = MOTS_CLES.includes(mot) ? '#1e4fa0' : '#1e6b35';
    b.textContent = mot;
    b.addEventListener('click', () => completer(mot));
    if (idx === 0 && !AUTO_COMPLETE[pl]) suggActifs[0] = { template: false, mot };
    else suggActifs.push({ template: false, mot });
    suggInner.appendChild(b);
  });

  suggScroll.classList.add('visible');
}

function completer(mot) {
  const pos     = editeur.selectionStart;
  const avant   = editeur.value.slice(0, pos);
  const m       = avant.match(/[A-Za-zÀ-ÿ_][A-Za-zÀ-ÿ0-9_]*$/);
  const prefixe = m ? m[0] : '';
  const debut   = pos - prefixe.length;
  ignoreChange  = true;
  editeur.value = editeur.value.slice(0, debut) + mot + editeur.value.slice(pos);
  ignoreChange  = false;
  editeur.setSelectionRange(debut + mot.length, debut + mot.length);
  editeur.focus();
  suggInner.innerHTML = '';
  suggScroll.classList.remove('visible');
  suggActifs = [];
  majTout();
}

function completerTemplate(texte, offset) {
  const pos     = editeur.selectionStart;
  const avant   = editeur.value.slice(0, pos);
  const m       = avant.match(/[A-Za-zÀ-ÿ_][A-Za-zÀ-ÿ0-9_]*$/);
  const prefixe = m ? m[0] : '';
  const debut   = pos - prefixe.length;
  ignoreChange  = true;
  editeur.value = editeur.value.slice(0, debut) + texte + editeur.value.slice(pos);
  ignoreChange  = false;
  const nc = debut + texte.length - offset;
  editeur.setSelectionRange(nc, nc);
  editeur.focus();
  suggInner.innerHTML = '';
  suggScroll.classList.remove('visible');
  suggActifs = [];
  majTout();
}

// ════════════════════════════════════════════════
// GESTION DES FICHIERS
// Stockage dans localStorage — survit aux rechargements
// ════════════════════════════════════════════════
function getListe() {
  return JSON.parse(localStorage.getItem('jealgo_liste') || '[]');
}
function setListe(l) {
  localStorage.setItem('jealgo_liste', JSON.stringify(l));
}

// Rafraîchir le panneau fichiers
function majPanneauFichiers() {
  fichListe.innerHTML = '';
  const liste = getListe();
  if (!liste.length) {
    const vide = document.createElement('div');
    vide.style.cssText = 'color:#555;font-size:11px;padding:16px 10px;text-align:center;line-height:1.6;';
    vide.textContent = 'Aucun fichier\nUtilise + Nouveau';
    fichListe.appendChild(vide);
    return;
  }
  liste.forEach(nom => {
    const item = document.createElement('div');
    item.className = 'fich-item' + (nom === cheminFichier ? ' actif' : '');

    const nomEl = document.createElement('span');
    nomEl.className = 'fich-nom';
    nomEl.textContent = nom;
    nomEl.title = 'Clic: ouvrir  |  Double-clic: renommer';
    nomEl.addEventListener('click',    () => ouvrirFichier(nom));
    nomEl.addEventListener('dblclick', () => demanderRenommer(nom));

    const sup = document.createElement('button');
    sup.className   = 'fich-sup';
    sup.textContent = '🗑';
    sup.title       = 'Supprimer ce fichier';
    sup.addEventListener('click', e => {
      e.stopPropagation();
      supprimerFichier(nom);
    });

    item.appendChild(nomEl);
    item.appendChild(sup);
    fichListe.appendChild(item);
  });
}

// Sauvegarde silencieuse — sans message
function sauverFichierSilencieux(nom) {
  if (!nom) return;
  localStorage.setItem('jealgo_' + nom, editeur.value);
  const liste = getListe();
  if (!liste.includes(nom)) {
    liste.push(nom);
    setListe(liste);
    majPanneauFichiers();
  }
}

// Sauvegarde avec confirmation dans la barre statut
function sauverFichierActuel() {
  if (!cheminFichier) {
    ouvrirPopupNouveau(true);
  } else {
    sauverFichierSilencieux(cheminFichier);
    statut.textContent = '✓ Sauvegardé : ' + cheminFichier;
    setTimeout(majStatut, 1500);
  }
}

function ouvrirFichier(nom) {
  if (!nom.endsWith('.je')) nom += '.je';
  const contenu = localStorage.getItem('jealgo_' + nom);
  if (contenu === null) { alert('Fichier introuvable : ' + nom); return; }
  editeur.value = contenu;
  titreFichier  = nom;
  cheminFichier = nom;
  historique = [];
  futur      = [];
  majTout();
  majPanneauFichiers();
}

function supprimerFichier(nom) {
  if (!confirm('Supprimer définitivement ' + nom + ' ?')) return;
  localStorage.removeItem('jealgo_' + nom);
  const liste = getListe().filter(n => n !== nom);
  setListe(liste);
  // Si c'est le fichier actuel, réinitialiser
  if (cheminFichier === nom) {
    editeur.value = '';
    titreFichier  = 'sans_titre.je';
    cheminFichier = null;
    localStorage.removeItem(CLE_BROUILLON);
    localStorage.removeItem(CLE_TITRE);
    localStorage.removeItem(CLE_CHEMIN);
    majTout();
  }
  majPanneauFichiers();
}

function demanderRenommer(nom) {
  renommerAncien = nom;
  const input = document.getElementById('renommer-input');
  input.value = nom.replace('.je', '');
  document.getElementById('overlay-renommer').classList.add('visible');
  setTimeout(() => input.focus(), 100);
}

document.getElementById('renommer-ok').addEventListener('click', () => {
  let nouveau = document.getElementById('renommer-input').value.trim();
  if (!nouveau) return;
  if (!nouveau.endsWith('.je')) nouveau += '.je';
  if (nouveau === renommerAncien) { fermerPopup('overlay-renommer'); return; }
  const contenu = localStorage.getItem('jealgo_' + renommerAncien) || '';
  localStorage.setItem('jealgo_' + nouveau, contenu);
  localStorage.removeItem('jealgo_' + renommerAncien);
  const liste = getListe().map(n => n === renommerAncien ? nouveau : n);
  setListe(liste);
  if (cheminFichier === renommerAncien) {
    titreFichier  = nouveau;
    cheminFichier = nouveau;
    sauvegarderBrouillon();
  }
  fermerPopup('overlay-renommer');
  majPanneauFichiers();
  majStatut();
});

// Nouveau fichier ou sauvegarder sous
function nouveauFichier() { ouvrirPopupNouveau(false); }

function ouvrirPopupNouveau(estSauvegarde) {
  const input  = document.getElementById('nouveau-input');
  const ok     = document.getElementById('nouveau-ok');
  const titre  = document.getElementById('nouveau-titre');
  input.value       = '';
  titre.textContent = estSauvegarde ? 'Enregistrer sous' : 'Nouveau fichier';
  input.placeholder = estSauvegarde
    ? titreFichier.replace('.je', '')
    : 'mon_algorithme';
  ok.textContent = estSauvegarde ? 'Enregistrer' : 'Créer';
  ok.onclick = () => {
    let nom = input.value.trim() || (estSauvegarde ? titreFichier : 'sans_titre');
    if (!nom.endsWith('.je')) nom += '.je';
    if (!estSauvegarde) {
      if (editeur.value && !confirm('Créer un nouveau fichier ? Le travail actuel sera perdu.')) {
        fermerPopup('overlay-nouveau');
        return;
      }
      editeur.value = '';
      historique = [];
      futur      = [];
    }
    localStorage.setItem('jealgo_' + nom, editeur.value);
    const liste = getListe();
    if (!liste.includes(nom)) { liste.push(nom); setListe(liste); }
    titreFichier  = nom;
    cheminFichier = nom;
    sauvegarderBrouillon();
    fermerPopup('overlay-nouveau');
    majTout();
    majPanneauFichiers();
  };
  document.getElementById('overlay-nouveau').classList.add('visible');
  setTimeout(() => input.focus(), 100);
}

// ════════════════════════════════════════════════
// IMPORT / EXPORT
// Import = charger depuis l'appareil
// Export = télécharger sur l'appareil
// ════════════════════════════════════════════════
function importerFichier() { importInput.click(); }

importInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    editeur.value = ev.target.result;
    let nom = file.name;
    if (!nom.endsWith('.je')) nom = nom.split('.')[0] + '.je';
    titreFichier  = nom;
    cheminFichier = nom;
    historique = [];
    futur      = [];
    sauverFichierSilencieux(nom);
    majTout();
    majPanneauFichiers();
  };
  reader.readAsText(file);
  importInput.value = '';
});

function exporterFichier() {
  const nom  = cheminFichier || titreFichier || 'sans_titre.je';
  const blob = new Blob([editeur.value], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = nom;
  a.click();
  URL.revokeObjectURL(url);
}

// ════════════════════════════════════════════════
// POPUPS
// ════════════════════════════════════════════════
function fermerPopup(id) {
  document.getElementById(id).classList.remove('visible');
}

document.getElementById('overlay-renommer').addEventListener('click', e => {
  if (e.target === e.currentTarget) fermerPopup('overlay-renommer');
});
document.getElementById('overlay-nouveau').addEventListener('click', e => {
  if (e.target === e.currentTarget) fermerPopup('overlay-nouveau');
});
document.getElementById('renommer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('renommer-ok').click();
});
document.getElementById('nouveau-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('nouveau-ok').click();
});

// ════════════════════════════════════════════════
// INITIALISATION
// ════════════════════════════════════════════════
restaurerBrouillon(); // Restaure le travail au rechargement
majTout();
majPanneauFichiers();
</script>
